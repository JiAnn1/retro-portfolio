<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jean Grace | Retro Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop">
        
        <div class="shortcut" id="icon-project">
            <div class="icon-picture">🎬</div>
            <div class="icon-label">AI Video Project</div>
        </div>

        <div class="shortcut" id="icon-about">
            <div class="icon-picture">💾</div>
            <div class="icon-label">About Me.txt</div>
        </div>

        <div class="window" id="window-project" style="display: none;">
            <div class="window-header">
                <span class="window-title">🎬 AI Video Planner.exe</span>
                <button class="close-button" id="close-project">X</button>
            </div>
            <div class="window-body">
                <iframe src="https://jiann1-ai-video-planner.streamlit.app/~/+/" class="app-iframe"></iframe>
            </div>
        </div>

    </div>

    <div class="taskbar">
        <button class="start-button">
            <span>💾</span> Start
        </button>
        <div class="time-display" id="clock">12:00 PM</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
