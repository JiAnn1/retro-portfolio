<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jean Grace | Retro Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop">
        
        <div class="shortcut" id="icon-project">
            <div class="icon-picture">🎬</div>
            <div class="icon-label">AI Video Project</div>
        </div>

        <div class="shortcut" id="icon-about">
            <div class="icon-picture">💾</div>
            <div class="icon-label">About Me.txt</div>
        </div>

    </div>

    <div class="taskbar">
        <button class="start-button">
            <span>💾</span> Start
        </button>
        <div class="time-display" id="clock">12:00 PM</div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
