<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jean Grace | Retro Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop">
        
        <div class="shortcut" id="icon-project">
            <div class="icon-picture">🎬</div>
            <div class="icon-label">AI Video Project</div>
        </div>

        <div class="shortcut" id="icon-about">
            <div class="icon-picture">💾</div>
            <div class="icon-label">About Me.txt</div>
        </div>

        <div class="window" id="window-about" style="display: none;">
            <div class="window-header">
                <span class="window-title">📝 About Me.txt - Notepad</span>
                <button class="close-button" id="close-about">X</button>
            </div>
            <div class="window-body">
                <textarea readonly class="notepad-textarea">
Hello! I'm Jean Grace. 

I am a Junior Developer bridging the gap between Computer Science and creative video production. I build automated workflows and creative tools to optimize video tracking and strategy.

[ SKILLS ]
- Python / Streamlit / Full-stack AI Integration
- Git / GitHub / Cloud Deployment
- Creative Direction & Video Post-Production

Click around my desktop to explore my live software builds!
                </textarea>
            </div>
        </div>

    </div>

    <div class="taskbar">
        <button class="start-button">
            <span>💾</span> Start
        </button>
        <div class="time-display" id="clock">12:00 PM</div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
